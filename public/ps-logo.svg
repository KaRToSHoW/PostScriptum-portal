<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Логотип P.S. — оранжевая P с пингвином и тёмно-синяя S -->
  <circle cx="100" cy="100" r="98" fill="#FBF8F3"/>

  <!-- ── P (оранжевая) ── -->
  <!-- петля P -->
  <path d="M 60 138 C 38 112, 40 70, 70 52 C 96 37, 126 44, 133 64 C 139 82, 126 98, 106 102"
        stroke="#F29A2E" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- ножка P -->
  <path d="M 68 84 L 55 140" stroke="#F29A2E" stroke-width="14" stroke-linecap="round"/>
  <!-- точка после P -->
  <circle cx="52" cy="161" r="8" fill="#F29A2E"/>

  <!-- ── Пингвин внутри петли ── -->
  <g transform="translate(88 82) rotate(-35)">
    <!-- тело -->
    <ellipse cx="0" cy="0" rx="17" ry="24" fill="#2B2073"/>
    <!-- белое брюшко -->
    <ellipse cx="2.5" cy="4" rx="11" ry="17" fill="#FBF8F3"/>
    <!-- крыло -->
    <path d="M -14 -4 C -22 4, -20 16, -10 20 C -14 10, -15 2, -14 -4 Z" fill="#2B2073"/>
    <!-- клюв -->
    <path d="M 6 -18 L 16 -14 L 7 -10 Z" fill="#F29A2E"/>
    <!-- глаз -->
    <circle cx="4" cy="-16" r="1.8" fill="#FBF8F3"/>
    <!-- лапки -->
    <path d="M -4 23 L -9 29 L -1 27 Z" fill="#F29A2E"/>
    <path d="M 6 22 L 4 30 L 11 26 Z" fill="#F29A2E"/>
  </g>

  <!-- ── S (тёмно-синяя) ── -->
  <path d="M 155 58 C 148 42, 122 42, 112 54
           M 155 58 C 160 72, 146 80, 134 88 C 120 97, 112 106, 118 122 C 125 140, 152 146, 166 134"
        stroke="#2B2073" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- точка после S -->
  <circle cx="172" cy="155" r="8" fill="#2B2073"/>
</svg>
