services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psportal}
      POSTGRES_USER: ${POSTGRES_USER:-psportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psportal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_cont
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-psportal}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-psportal}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS: 2592000000
      APP_MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY}
      APP_UPLOAD_DIR: /app/uploads
      APP_S3_ENABLED: ${S3_ENABLED:-false}
      APP_S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.twcstorage.ru}
      APP_S3_REGION: ${S3_REGION:-ru-1}
      APP_S3_BUCKET: ${S3_BUCKET:-}
      APP_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      APP_S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      APP_S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      APP_TURN_URL: ${TURN_URL:-}
      APP_TURN_USER: ${TURN_USER:-psportal}
      APP_TURN_PASSWORD: ${TURN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # TURN-сервер для видеоконференций (ретрансляция медиа при строгом NAT).
  # Запускается только на сервере: docker compose up -d coturn
  # Требует открытых портов: 3478/tcp+udp и 49160-49200/udp
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    profiles: ["turn"]
    command: >
      -n --log-file=stdout
      --listening-port=3478
      --min-port=49160 --max-port=49200
      --realm=psportal
      --lt-cred-mech
      --user=${TURN_USER:-psportal}:${TURN_PASSWORD:-}
      --fingerprint
      --no-tls --no-dtls
      --no-cli

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"

volumes:
  db_data:
  pgadmin_data:
  uploads_data: