services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-psportal}
      POSTGRES_USER:     ${POSTGRES_USER:-psportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psportal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../PostSciptum-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/${POSTGRES_DB:-psportal}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-psportal}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET:             ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS:      86400000
      CORS_ALLOWED_ORIGINS:       ${FRONTEND_URL:-http://localhost}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # пустая строка = nginx проксирует /api/ сам
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
