server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Разрешаем загрузку файлов до 25 МБ (домашки, аватары, материалы)
    client_max_body_size 25M;

    # Хэшированные ассеты (JS/CSS с хешем в имени) — кэшируем надолго, имя меняется при каждой сборке
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # index.html и SPA-фолбэк — никогда не кэшируем, иначе после деплоя грузится старый бандл
        # (из-за этого «мигали» кнопки входа: на загрузке старая версия, на Ctrl+Shift+R — новая)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
    }
}
